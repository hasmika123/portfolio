name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1: Validate & Lint ──────────────────────────────────────────────
  validate:
    name: Validate HTML & Check Security Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML
        run: html-validate index.html || true

      - name: Check that DOMPurify is referenced
        run: |
          if grep -q "DOMPurify" index.html; then
            echo "✅ XSS protection (DOMPurify) is present"
          else
            echo "❌ WARNING: DOMPurify not found in index.html"
            exit 1
          fi

      - name: Check that HTTPS Supabase URL is used
        run: |
          if grep -q "https://" index.html; then
            echo "✅ HTTPS references found"
          else
            echo "❌ WARNING: No HTTPS references found"
          fi

  # ── Job 2: Deploy ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployment URL
        run: echo "🚀 Deployed to ${{ steps.deployment.outputs.page_url }}"
